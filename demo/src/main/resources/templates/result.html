<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>おみくじ結果</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding-top: 50px; }
        .box { background: white; padding: 40px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .result-text { font-size: 32px; color: #e74c3c; font-weight: bold; margin: 30px 0; }
        .btn { display: inline-block; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>あなたのおみくじ結果</h1>
        
        <!-- 💡 [[${result}]] の部分に、Javaが選んだ文字が自動的にはめ込まれます -->
        <div class="result-text">[[${result}]]</div>
        
        <a href="/" class="btn">もう一度引く</a>
    </div>
</body>
</html>
