<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Webおみくじアプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding-top: 50px; }
        .box { background: white; padding: 40px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 15px 30px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>本日の運勢アプリ</h1>
        <p>下のボタンを押すと、Javaのプログラムが裏側で運勢を計算します。</p>
        <a href="/omikuji" class="btn">おみくじを引く！</a>
    </div>
</body>
</html>
