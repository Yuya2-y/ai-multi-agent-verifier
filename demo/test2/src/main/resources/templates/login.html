<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | AI検証チャット</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: #1f1f1f;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        .card h1 {
            margin-bottom: 1rem;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            margin-bottom: 0.5rem;
            color: #c7c7c7;
            font-size: 0.95rem;
        }
        .field input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 14px;
            border: 1px solid #333;
            background: #121212;
            color: #ffffff;
            outline: none;
            font-size: 1rem;
        }
        .button {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 14px;
            border: none;
            background: #4f8bff;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .error {
            margin-bottom: 1rem;
            color: #ff6b6b;
            font-size: 0.95rem;
        }
        .hint {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #9aa0a6;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>ログイン</h1>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form th:action="@{/login}" method="post">
        <div class="field">
            <label for="username">ユーザー名</label>
            <input type="text" id="username" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="field">
            <label for="password">パスワード</label>
            <input type="password" id="password" name="password" placeholder="password" required>
        </div>
        <button type="submit" class="button">ログイン</button>
    </form>
    <div class="hint">初期アカウント: admin / password</div>
</div>
</body>
</html>
